name: Build & Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET 9.0
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Bump version
        id: ver
        run: |
          # Lire la version (peut etre 1.2.0 ou 1.2.0.0), normaliser en 3 parties
          RAW_VER=$(python3 -c "import json; d=json.load(open('manifest.json')); print(d[0]['versions'][0]['version'])")
          CURRENT=$(echo "$RAW_VER" | cut -d. -f1-3)
          IFS='.' read -r MAJ MIN PAT <<< "$CURRENT"

          LAST_TAG=$(git tag --sort=-version:refname | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' | head -1 || true)
          if [ -z "$LAST_TAG" ]; then
            COMMITS=$(git log --no-merges --pretty=format:"%s" | head -20)
          else
            COMMITS=$(git log "${LAST_TAG}..HEAD" --no-merges --pretty=format:"%s")
          fi

          # breaking change ou ! -> majeur | feat -> mineur | reste -> patch
          if echo "$COMMITS" | grep -qiE "BREAKING.CHANGE|^[a-z]+(\([^)]*\))?!:"; then
            MAJ=$((MAJ+1)); MIN=0; PAT=0
          elif echo "$COMMITS" | grep -qi "^feat"; then
            MIN=$((MIN+1)); PAT=0
          else
            PAT=$((PAT+1))
          fi

          NEW="${MAJ}.${MIN}.${PAT}"        # tag GitHub : 1.2.0
          NEW_FULL="${NEW}.0"               # version interne : 1.2.0.0 (requis par Jellyfin + .NET)
          echo "version=$NEW" >> $GITHUB_OUTPUT
          echo "$CURRENT -> $NEW_FULL"

          jq --arg v "$NEW_FULL" '.[0].versions[0].version = $v' manifest.json > manifest.tmp && mv manifest.tmp manifest.json
          sed -i "s|<AssemblyVersion>.*</AssemblyVersion>|<AssemblyVersion>${NEW_FULL}</AssemblyVersion>|" JellyfinCarouselPlugin.csproj
          sed -i "s|<FileVersion>.*</FileVersion>|<FileVersion>${NEW_FULL}</FileVersion>|" JellyfinCarouselPlugin.csproj

      - name: Build
        run: |
          dotnet restore --configfile nuget.config
          dotnet build JellyfinCarouselPlugin.csproj -c Release --no-restore

      - name: Package ZIP
        run: |
          cd bin/Release/net9.0
          zip -r ../../../JellyfinCarouselPlugin.zip .

      - name: Update manifest sourceUrl + checksum
        run: |
          V=${{ steps.ver.outputs.version }}
          MD5=$(md5sum JellyfinCarouselPlugin.zip | awk '{print $1}')
          URL="https://github.com/peterdu1109/MediaCarousel/releases/download/${V}/JellyfinCarouselPlugin.zip"
          jq --arg url "$URL" --arg md5 "$MD5" '.[0].versions[0].sourceUrl=$url | .[0].versions[0].checksum=$md5' manifest.json > manifest.tmp
          mv manifest.tmp manifest.json

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add manifest.json JellyfinCarouselPlugin.csproj
          git diff --cached --quiet || git commit -m "chore: bump ${{ steps.ver.outputs.version }} [skip ci]"
          git push origin main

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: JellyfinCarouselPlugin
          path: JellyfinCarouselPlugin.zip
          retention-days: 30

      - name: Create Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          V=${{ steps.ver.outputs.version }}
          LAST_TAG=$(git tag --sort=-version:refname | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' | grep -v "^${V}$" | head -1 || true)
          if [ -z "$LAST_TAG" ]; then
            LOG=$(git log --no-merges --pretty=format:"- %s" | grep -v "\[skip ci\]" | head -20)
          else
            LOG=$(git log "${LAST_TAG}..HEAD" --no-merges --pretty=format:"- %s" | grep -v "\[skip ci\]")
          fi
          [ -z "$LOG" ] && LOG="- Mise a jour et corrections diverses"

          N=/tmp/notes.md
          echo "## Media Carousel v${V}"                                                                         > "$N"
          echo ""                                                                                                >> "$N"
          echo "### Changements"                                                                                 >> "$N"
          echo ""                                                                                                >> "$N"
          echo "$LOG"                                                                                            >> "$N"
          echo ""                                                                                                >> "$N"
          echo "---"                                                                                             >> "$N"
          echo ""                                                                                                >> "$N"
          echo "## Installation"                                                                                 >> "$N"
          echo ""                                                                                                >> "$N"
          echo "### Via le catalogue Jellyfin"                                                                   >> "$N"
          echo "1. Dashboard > Plugins > Catalogues > +"                                                        >> "$N"
          echo "2. URL :"                                                                                        >> "$N"
          echo '```'                                                                                             >> "$N"
          echo "https://raw.githubusercontent.com/peterdu1109/MediaCarousel/main/manifest.json"                 >> "$N"
          echo '```'                                                                                             >> "$N"
          echo "3. Installe Carousel Layout et redemarre Jellyfin"                                               >> "$N"
          echo ""                                                                                                >> "$N"
          echo "**Prerequis :** Jellyfin 10.11.x"                                                               >> "$N"

          gh release delete "$V" --yes --cleanup-tag 2>/dev/null || true
          gh release create "$V" \
            --title "Media Carousel v${V}" \
            --notes-file "$N" \
            JellyfinCarouselPlugin.zip
