name: Build & Release

on:
  push:
    branches:
      - main
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 9.0
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore dependencies
        run: dotnet restore --configfile nuget.config

      - name: Build
        run: dotnet build JellyfinCarouselPlugin.csproj -c Release --no-restore

      - name: Package ZIP
        run: |
          cd bin/Release/net9.0
          zip -r ../../../JellyfinCarouselPlugin.zip .
          cd ../../..
          echo "MD5: $(md5sum JellyfinCarouselPlugin.zip | awk '{print $1}')"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: JellyfinCarouselPlugin
          path: JellyfinCarouselPlugin.zip
          retention-days: 30

      - name: Get version from manifest
        id: version
        run: |
          VERSION=$(python3 -c "import json; data=json.load(open('manifest.json')); print(data[0]['versions'][0]['version'])")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version détectée : $VERSION"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: "Media Carousel ${{ steps.version.outputs.version }}"
          files: JellyfinCarouselPlugin.zip
          generate_release_notes: false
          body: |
            ## 🎬 Media Carousel ${{ steps.version.outputs.version }}

            Transformez votre Jellyfin en une expérience de streaming moderne et immersive.

            ---

            ## ✨ Nouveautés

            - **Page de configuration complète** — HeroMode, couleur accent, toggles par catégorie
            - **Bannière Hero personnalisable** — Aléatoire, Dernier ajout ou En cours de lecture
            - **Bouton Favoris** — Ajout/retrait au survol sans ouvrir la fiche
            - **Badges dynamiques** — Qualité vidéo (4K / HD) et nouveaux épisodes
            - **Carrousel Collections** — Boxsets et sagas complètes
            - **Chargement différé des genres** — Performances améliorées via IntersectionObserver
            - **Compatibilité renforcée** — Plus de conflits avec Enhanced Home Screen Sections
            - **Correction injection** — Détection automatique du chemin `index.html` sur toutes les installations (Windows, Linux, Docker)

            ---

            ## 🚀 Installation

            ### Via le catalogue Jellyfin (recommandé)

            1. **Dashboard → Plugins → Catalogues → +**
            2. Colle cette URL :
            ```
            https://raw.githubusercontent.com/peterdu1109/MediaCarousel/main/manifest.json
            ```
            3. **Dashboard → Plugins → Catalogue** → installe **Carousel Layout** → redémarre Jellyfin

            ### Installation manuelle

            1. Télécharge `JellyfinCarouselPlugin.zip` ci-dessous
            2. Extrais dans un dossier `CarouselLayout` dans le répertoire `plugins` de Jellyfin
            3. Redémarre Jellyfin

            ---

            ## ⚙️ Après installation

            Configure le plugin depuis **Dashboard → Plugins → Carousel Layout → Paramètres**
            puis recharge la page d'accueil **(F5)**.

            ---

            ## 📋 Prérequis

            - Jellyfin **10.11.x**
