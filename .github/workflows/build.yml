name: Build & Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET 9.0
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore dependencies
        run: dotnet restore --configfile nuget.config

      - name: Build
        run: dotnet build JellyfinCarouselPlugin.csproj -c Release --no-restore

      - name: Package ZIP
        run: |
          cd bin/Release/net9.0
          zip -r ../../../JellyfinCarouselPlugin.zip .

      - name: Update manifest.json
        run: |
          VERSION=$(python3 -c "import json; d=json.load(open('manifest.json')); print(d[0]['versions'][0]['version'])")
          MD5=$(md5sum JellyfinCarouselPlugin.zip | awk '{print $1}')
          SOURCE_URL="https://github.com/peterdu1109/MediaCarousel/releases/download/${VERSION}/JellyfinCarouselPlugin.zip"
          echo "Version=$VERSION  MD5=$MD5  URL=$SOURCE_URL"
          jq --arg url "$SOURCE_URL" --arg md5 "$MD5" '.[0].versions[0].sourceUrl = $url | .[0].versions[0].checksum = $md5' manifest.json > manifest.tmp
          mv manifest.tmp manifest.json
          echo "manifest.json mis a jour"

      - name: Commit manifest.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add manifest.json
          if git diff --cached --quiet; then
            echo "Aucun changement"
          else
            git commit -m "chore: sourceUrl + checksum [skip ci]"
            git push origin main
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: JellyfinCarouselPlugin
          path: JellyfinCarouselPlugin.zip
          retention-days: 30

      - name: Publish Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(python3 -c "import json; d=json.load(open('manifest.json')); print(d[0]['versions'][0]['version'])")
          echo "Version: $VERSION"

          # Changelog depuis le tag precedent
          PREV_TAG=$(git tag --sort=-version:refname | grep -E '^[0-9]+\.[0-9]+\.[0-9]+' | grep -v "^${VERSION}$" | head -1 || true)
          echo "Tag precedent: ${PREV_TAG:-aucun}"
          if [ -z "$PREV_TAG" ]; then
            RAW=$(git log --no-merges --pretty=format:"- %s" | head -20 || true)
          else
            RAW=$(git log "${PREV_TAG}..HEAD" --no-merges --pretty=format:"- %s" || true)
          fi
          [ -z "$RAW" ] && RAW="- Mise a jour et corrections diverses"

          # Ecrire les notes de release
          N=/tmp/release-notes.md
          echo "## Media Carousel v${VERSION}"                                                                    > "$N"
          echo ""                                                                                                 >> "$N"
          echo "Transformez votre Jellyfin en une experience de streaming moderne et immersive."                 >> "$N"
          echo ""                                                                                                 >> "$N"
          echo "---"                                                                                             >> "$N"
          echo ""                                                                                                 >> "$N"
          echo "### Changements"                                                                                 >> "$N"
          echo ""                                                                                                 >> "$N"
          echo "$RAW"                                                                                            >> "$N"
          echo ""                                                                                                 >> "$N"
          echo "---"                                                                                             >> "$N"
          echo ""                                                                                                 >> "$N"
          echo "## Installation"                                                                                 >> "$N"
          echo ""                                                                                                 >> "$N"
          echo "### Via le catalogue Jellyfin (recommande)"                                                      >> "$N"
          echo ""                                                                                                 >> "$N"
          echo "1. Dashboard > Plugins > Catalogues > +"                                                        >> "$N"
          echo "2. Ajoute cette URL :"                                                                           >> "$N"
          echo '```'                                                                                             >> "$N"
          echo "https://raw.githubusercontent.com/peterdu1109/MediaCarousel/main/manifest.json"                 >> "$N"
          echo '```'                                                                                             >> "$N"
          echo "3. Installe Carousel Layout puis redemarre Jellyfin"                                             >> "$N"
          echo ""                                                                                                 >> "$N"
          echo "### Installation manuelle"                                                                       >> "$N"
          echo ""                                                                                                 >> "$N"
          echo "1. Telecharge JellyfinCarouselPlugin.zip ci-dessous"                                            >> "$N"
          echo "2. Extrais dans plugins/CarouselLayout/ de Jellyfin"                                            >> "$N"
          echo "3. Redemarre Jellyfin"                                                                           >> "$N"
          echo ""                                                                                                 >> "$N"
          echo "---"                                                                                             >> "$N"
          echo ""                                                                                                 >> "$N"
          echo "**Prerequis :** Jellyfin 10.11.x — navigateur web ou app Android"                               >> "$N"

          # Supprimer la release existante si elle existe, puis recreer proprement
          if gh release view "$VERSION" > /dev/null 2>&1; then
            echo "Suppression release existante $VERSION..."
            gh release delete "$VERSION" --yes --cleanup-tag
          fi
          echo "Creation release $VERSION..."
          gh release create "$VERSION" \
            --title "Media Carousel v${VERSION}" \
            --notes-file "$N" \
            JellyfinCarouselPlugin.zip
          echo "Release v${VERSION} publiee avec succes."
