name: Build & Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET 9.0
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Bump version
        id: ver
        run: |
          # Lire la version (peut etre 1.2.0 ou 1.2.0.0), normaliser en 3 parties
          RAW_VER=$(python3 -c "import json; d=json.load(open('manifest.json')); print(d[0]['versions'][0]['version'])")
          CURRENT=$(echo "$RAW_VER" | cut -d. -f1-3)
          IFS='.' read -r MAJ MIN PAT <<< "$CURRENT"

          LAST_TAG=$(git tag --sort=-version:refname | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' | head -1 || true)
          if [ -z "$LAST_TAG" ]; then
            COMMITS=$(git log --no-merges --pretty=format:"%s" | head -20)
          else
            COMMITS=$(git log "${LAST_TAG}..HEAD" --no-merges --pretty=format:"%s")
          fi

          # breaking change ou ! -> majeur | feat -> mineur | reste -> patch
          if echo "$COMMITS" | grep -qiE "BREAKING.CHANGE|^[a-z]+(\([^)]*\))?!:"; then
            MAJ=$((MAJ+1)); MIN=0; PAT=0
          elif echo "$COMMITS" | grep -qi "^feat"; then
            MIN=$((MIN+1)); PAT=0
          else
            PAT=$((PAT+1))
          fi

          NEW="${MAJ}.${MIN}.${PAT}"
          NEW_FULL="${NEW}.0"
          echo "version=$NEW" >> $GITHUB_OUTPUT
          echo "$CURRENT -> $NEW_FULL"

          TODAY=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          CHANGELOG=$(echo "$COMMITS" | grep -v "\[skip ci\]" | sed 's/^/- /' | head -20)
          [ -z "$CHANGELOG" ] && CHANGELOG="- Mise a jour et corrections diverses"

          # Prépendre une nouvelle entrée — ne jamais écraser l'historique
          jq --arg v "$NEW_FULL" --arg chg "$CHANGELOG" --arg ts "$TODAY" \
            '.[0].versions = [{"version":$v,"changelog":$chg,"targetAbi":"10.11.0.0","sourceUrl":"","checksum":"","timestamp":$ts}] + .[0].versions' \
            manifest.json > manifest.tmp && mv manifest.tmp manifest.json

          sed -i "s|<AssemblyVersion>.*</AssemblyVersion>|<AssemblyVersion>${NEW_FULL}</AssemblyVersion>|" JellyfinCarouselPlugin.csproj
          sed -i "s|<FileVersion>.*</FileVersion>|<FileVersion>${NEW_FULL}</FileVersion>|" JellyfinCarouselPlugin.csproj

      - name: Build
        run: |
          dotnet restore --configfile nuget.config
          dotnet build JellyfinCarouselPlugin.csproj -c Release --no-restore

      - name: Package ZIP
        run: |
          cd bin/Release/net9.0
          zip -r ../../../JellyfinCarouselPlugin.zip .

      - name: Update manifest sourceUrl + checksum
        run: |
          V=${{ steps.ver.outputs.version }}
          MD5=$(md5sum JellyfinCarouselPlugin.zip | awk '{print $1}')
          URL="https://github.com/peterdu1109/MediaCarousel/releases/download/${V}/JellyfinCarouselPlugin.zip"
          jq --arg url "$URL" --arg md5 "$MD5" '.[0].versions[0].sourceUrl=$url | .[0].versions[0].checksum=$md5' manifest.json > manifest.tmp
          mv manifest.tmp manifest.json

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add manifest.json JellyfinCarouselPlugin.csproj
          git diff --cached --quiet || git commit -m "chore: bump ${{ steps.ver.outputs.version }} [skip ci]"
          git push origin main

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: JellyfinCarouselPlugin
          path: JellyfinCarouselPlugin.zip
          retention-days: 30

      - name: Create Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          V=${{ steps.ver.outputs.version }}
          LAST_TAG=$(git tag --sort=-version:refname | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' | grep -v "^${V}$" | head -1 || true)
          if [ -z "$LAST_TAG" ]; then
            RAW=$(git log --no-merges --pretty=format:"%s" | grep -v "\[skip ci\]" | head -30)
          else
            RAW=$(git log "${LAST_TAG}..HEAD" --no-merges --pretty=format:"%s" | grep -v "\[skip ci\]")
          fi
          [ -z "$RAW" ] && RAW="Mise à jour et corrections diverses"

          # Transformer les commits conventionnels en release notes lisibles
          NOTES=$(python3 - "$RAW" <<'PYEOF'
import sys, re

raw = sys.argv[1]
feats, fixes, perfs, others = [], [], [], []

for line in raw.strip().split('\n'):
    line = line.strip()
    if not line:
        continue
    m = re.match(r'^(\w+)(?:\([^)]*\))?!?:\s*(.+)$', line)
    if m:
        t, msg = m.group(1).lower(), m.group(2).strip()
        msg = msg[0].upper() + msg[1:]
        if t == 'feat':
            feats.append(msg)
        elif t in ('fix', 'hotfix'):
            fixes.append(msg)
        elif t == 'perf':
            perfs.append(msg)
        elif t not in ('chore', 'build', 'ci', 'docs'):
            others.append(msg)
    else:
        others.append(line[0].upper() + line[1:])

out = []
if feats:
    out.append('### ✨ Nouvelles fonctionnalités\n' + '\n'.join(f'- {x}' for x in feats))
if fixes:
    out.append('### 🐛 Corrections\n' + '\n'.join(f'- {x}' for x in fixes))
if perfs:
    out.append('### ⚡ Performances\n' + '\n'.join(f'- {x}' for x in perfs))
if others:
    out.append('### 🔧 Améliorations\n' + '\n'.join(f'- {x}' for x in others))
if not out:
    out.append('### 🔧 Améliorations\n- Mise à jour et corrections diverses')

print('\n\n'.join(out))
PYEOF
          )

          N=/tmp/notes.md
          cat > "$N" << NOTES_EOF
## 🎬 Media Carousel v${V}

${NOTES}

---

## 📦 Installation

### Via le catalogue Jellyfin *(recommandé)*
1. **Dashboard → Plugins → Catalogues → +**
2. Colle cette URL :
\`\`\`
https://raw.githubusercontent.com/peterdu1109/MediaCarousel/main/manifest.json
\`\`\`
3. Installe **Carousel Layout** et redémarre Jellyfin

### Mise à jour depuis une version précédente
Jellyfin détecte et propose automatiquement la mise à jour si tu utilises le catalogue.
Sinon, télécharge le ZIP ci-dessous, remplace les fichiers dans ton dossier \`plugins/CarouselLayout/\` et redémarre.

---

**Prérequis :** Jellyfin 10.11.x · [Aide & documentation](https://github.com/peterdu1109/MediaCarousel#readme)
NOTES_EOF

          gh release delete "$V" --yes --cleanup-tag 2>/dev/null || true
          gh release create "$V" \
            --title "🎬 Media Carousel v${V}" \
            --notes-file "$N" \
            JellyfinCarouselPlugin.zip
