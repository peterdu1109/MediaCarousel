name: Build & Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET 9.0
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore dependencies
        run: dotnet restore --configfile nuget.config

      - name: Build
        run: dotnet build JellyfinCarouselPlugin.csproj -c Release --no-restore

      - name: Package ZIP
        run: |
          cd bin/Release/net9.0
          zip -r ../../../JellyfinCarouselPlugin.zip .

      - name: Update manifest.json
        run: |
          VERSION=$(python3 -c "import json; d=json.load(open('manifest.json')); print(d[0]['versions'][0]['version'])")
          MD5=$(md5sum JellyfinCarouselPlugin.zip | awk '{print $1}')
          SOURCE_URL="https://github.com/peterdu1109/MediaCarousel/releases/download/${VERSION}/JellyfinCarouselPlugin.zip"
          echo "Version=$VERSION  MD5=$MD5  URL=$SOURCE_URL"
          jq --arg url "$SOURCE_URL" --arg md5 "$MD5" '.[0].versions[0].sourceUrl = $url | .[0].versions[0].checksum = $md5' manifest.json > manifest.tmp
          mv manifest.tmp manifest.json
          echo "manifest.json mis a jour"

      - name: Commit manifest.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add manifest.json
          if git diff --cached --quiet; then
            echo "Aucun changement"
          else
            git commit -m "chore: sourceUrl + checksum [skip ci]"
            git push origin main
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: JellyfinCarouselPlugin
          path: JellyfinCarouselPlugin.zip
          retention-days: 30

      - name: Publish Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(python3 -c "import json; d=json.load(open('manifest.json')); print(d[0]['versions'][0]['version'])")

          PREV_TAG=$(git tag --sort=-version:refname | grep -E '^[0-9]+\.[0-9]+\.[0-9]+' | grep -v "^${VERSION}$" | head -1)
          echo "Prev tag: ${PREV_TAG:-none}"

          if [ -z "$PREV_TAG" ]; then
            RAW=$(git log --no-merges --pretty=format:"%s" | head -20)
          else
            RAW=$(git log "${PREV_TAG}..HEAD" --no-merges --pretty=format:"%s")
          fi

          FEATS=$(echo "$RAW" | grep -i "^feat" | sed 's/^feat[^:]*: //' | grep -v '^$' | sed 's/^/- /' || true)
          FIXES=$(echo "$RAW" | grep -i "^fix"  | sed 's/^fix[^:]*: //'  | grep -v '^$' | sed 's/^/- /' || true)

          NOTES_FILE=/tmp/release-notes.md
          printf '## Media Carousel v%s\n\n' "$VERSION"                                                          > "$NOTES_FILE"
          printf 'Transformez votre Jellyfin en une experience de streaming moderne et immersive.\n\n'           >> "$NOTES_FILE"
          printf -- '---\n\n'                                                                                    >> "$NOTES_FILE"

          if [ -n "$FEATS" ]; then
            printf '### Nouvelles fonctionnalites\n%s\n\n' "$FEATS"                                             >> "$NOTES_FILE"
          fi
          if [ -n "$FIXES" ]; then
            printf '### Corrections\n%s\n\n' "$FIXES"                                                           >> "$NOTES_FILE"
          fi
          if [ -z "$FEATS" ] && [ -z "$FIXES" ]; then
            printf '- Mise a jour et corrections diverses\n\n'                                                   >> "$NOTES_FILE"
          fi

          printf -- '---\n\n'                                                                                    >> "$NOTES_FILE"
          printf '## Installation\n\n'                                                                           >> "$NOTES_FILE"
          printf '### Via le catalogue Jellyfin\n\n'                                                            >> "$NOTES_FILE"
          printf '1. Dashboard -> Plugins -> Catalogues -> +\n'                                                  >> "$NOTES_FILE"
          printf '2. Ajoute cette URL :\n'                                                                       >> "$NOTES_FILE"
          printf '```\nhttps://raw.githubusercontent.com/peterdu1109/MediaCarousel/main/manifest.json\n```\n'   >> "$NOTES_FILE"
          printf '3. Installe Carousel Layout puis redémarre Jellyfin\n\n'                                       >> "$NOTES_FILE"
          printf '### Installation manuelle\n\n'                                                                 >> "$NOTES_FILE"
          printf '1. Telecharge JellyfinCarouselPlugin.zip ci-dessous\n'                                        >> "$NOTES_FILE"
          printf '2. Extrais dans plugins/CarouselLayout/ de Jellyfin\n'                                        >> "$NOTES_FILE"
          printf '3. Redemarre Jellyfin\n\n'                                                                    >> "$NOTES_FILE"
          printf -- '---\n\n'                                                                                    >> "$NOTES_FILE"
          printf '## Prerequis\n\n'                                                                              >> "$NOTES_FILE"
          printf '- Jellyfin 10.11.x\n'                                                                         >> "$NOTES_FILE"
          printf '- Client navigateur web ou app Android\n'                                                     >> "$NOTES_FILE"

          git tag -f "$VERSION"
          git push origin "$VERSION" --force

          if gh release view "$VERSION" > /dev/null 2>&1; then
            echo "Mise a jour release $VERSION..."
            gh release edit "$VERSION" --title "Media Carousel v${VERSION}" --notes-file "$NOTES_FILE" --latest
            gh release upload "$VERSION" JellyfinCarouselPlugin.zip --clobber
          else
            echo "Creation release $VERSION..."
            gh release create "$VERSION" --title "Media Carousel v${VERSION}" --notes-file "$NOTES_FILE" --latest JellyfinCarouselPlugin.zip
          fi
          echo "Release v${VERSION} publiee."
