name: Build & Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET 9.0
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore dependencies
        run: dotnet restore --configfile nuget.config

      - name: Build
        run: dotnet build JellyfinCarouselPlugin.csproj -c Release --no-restore

      - name: Package ZIP
        run: |
          cd bin/Release/net9.0
          zip -r ../../../JellyfinCarouselPlugin.zip .

      - name: Update manifest.json (sourceUrl + checksum)
        run: |
          VERSION=$(python3 -c "import json; d=json.load(open('manifest.json')); print(d[0]['versions'][0]['version'])")
          MD5=$(md5sum JellyfinCarouselPlugin.zip | awk '{print $1}')
          SOURCE_URL="https://github.com/peterdu1109/MediaCarousel/releases/download/${VERSION}/JellyfinCarouselPlugin.zip"
          echo "Version : $VERSION | MD5 : $MD5"
          SOURCE_URL="$SOURCE_URL" MD5_VAL="$MD5" python3 -c "
import json, os
with open('manifest.json') as f:
    data = json.load(f)
data[0]['versions'][0]['sourceUrl'] = os.environ['SOURCE_URL']
data[0]['versions'][0]['checksum']   = os.environ['MD5_VAL']
with open('manifest.json', 'w') as f:
    json.dump(data, f, indent=2, ensure_ascii=False)
    f.write('\n')
"

      - name: Commit manifest.json si modifié
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add manifest.json
          if git diff --cached --quiet; then
            echo "manifest.json inchangé"
          else
            git commit -m "chore: mise à jour sourceUrl et checksum [skip ci]"
            git push origin main
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: JellyfinCarouselPlugin
          path: JellyfinCarouselPlugin.zip
          retention-days: 30

      - name: Générer le changelog et publier la release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(python3 -c "import json; d=json.load(open('manifest.json')); print(d[0]['versions'][0]['version'])")

          # Tag précédent (exclure le tag courant)
          PREV_TAG=$(git tag --sort=-version:refname \
            | grep -E '^[0-9]+\.[0-9]+\.[0-9]+' \
            | grep -v "^${VERSION}$" \
            | head -1)
          echo "Tag précédent : ${PREV_TAG:-aucun}"

          if [ -z "$PREV_TAG" ]; then
            RAW=$(git log --no-merges --pretty=format:"%s" | head -20)
          else
            RAW=$(git log "${PREV_TAG}..HEAD" --no-merges --pretty=format:"%s")
          fi

          FEATS=$(echo "$RAW"  | grep -i  "^feat"  | sed 's/^feat[^:]*: //' | grep -v '^$' | sed 's/^/- /' || true)
          FIXES=$(echo "$RAW"  | grep -i  "^fix"   | sed 's/^fix[^:]*: //'  | grep -v '^$' | sed 's/^/- /' || true)
          OTHERS=$(echo "$RAW" | grep -Eiv "^feat|^fix|^chore|^docs|^refactor|^Merge" \
            | grep -v '^$' | sed 's/^/- /' | head -10 || true)

          # Construire le changelog formaté
          CHANGELOG=""
          if [ -n "$FEATS" ]; then
            CHANGELOG="${CHANGELOG}### ✨ Nouvelles fonctionnalités\n${FEATS}\n\n"
          fi
          if [ -n "$FIXES" ]; then
            CHANGELOG="${CHANGELOG}### 🐛 Corrections\n${FIXES}\n\n"
          fi
          if [ -n "$OTHERS" ]; then
            CHANGELOG="${CHANGELOG}### 🔧 Améliorations\n${OTHERS}\n\n"
          fi
          if [ -z "$CHANGELOG" ]; then
            CHANGELOG="- Mise à jour et corrections diverses\n"
          fi

          # Écrire les notes de release dans un fichier (Python pour éviter les problèmes d'échappement)
          VERSION="$VERSION" CHANGELOG="$CHANGELOG" python3 - << 'PYEOF'
import os

version  = os.environ['VERSION']
changelog = os.environ['CHANGELOG'].replace('\\n', '\n')

notes  = f"## 🎬 Media Carousel v{version}\n\n"
notes += "Transformez votre Jellyfin en une expérience de streaming moderne et immersive.\n\n"
notes += "---\n\n"
notes += changelog
notes += "---\n\n"
notes += "## 🚀 Installation\n\n"
notes += "### Via le catalogue Jellyfin (recommandé)\n\n"
notes += "1. **Dashboard → Plugins → Catalogues → +**\n"
notes += "2. Colle cette URL :\n"
notes += "```\nhttps://raw.githubusercontent.com/peterdu1109/MediaCarousel/main/manifest.json\n```\n"
notes += "3. **Dashboard → Plugins → Catalogue** → installe **Carousel Layout** → redémarre Jellyfin\n\n"
notes += "### Installation manuelle\n\n"
notes += "1. Télécharge `JellyfinCarouselPlugin.zip` ci-dessous\n"
notes += "2. Extrais dans un dossier `CarouselLayout` dans le répertoire `plugins` de Jellyfin\n"
notes += "3. Redémarre Jellyfin\n\n"
notes += "---\n\n"
notes += "## ⚙️ Configuration\n\n"
notes += "**Dashboard → Plugins → Carousel Layout → Paramètres**, puis recharge la page (F5).\n\n"
notes += "---\n\n"
notes += "## 📋 Prérequis\n\n"
notes += "- Jellyfin **10.11.x**\n"
notes += "- Client **navigateur web** ou **app Android** (l'app iOS Swiftfin est native, non compatible)\n"

with open('/tmp/release-notes.md', 'w') as f:
    f.write(notes)
print("Notes de release écrites.")
PYEOF

          # Créer ou déplacer le tag sur le commit courant
          git tag -f "$VERSION"
          git push origin "$VERSION" --force

          # Créer la release si elle n'existe pas, la mettre à jour sinon
          if gh release view "$VERSION" > /dev/null 2>&1; then
            echo "Release $VERSION existante — mise à jour..."
            gh release edit "$VERSION" \
              --title "Media Carousel v${VERSION}" \
              --notes-file /tmp/release-notes.md \
              --latest
            gh release upload "$VERSION" JellyfinCarouselPlugin.zip --clobber
          else
            echo "Création de la release $VERSION..."
            gh release create "$VERSION" \
              --title "Media Carousel v${VERSION}" \
              --notes-file /tmp/release-notes.md \
              --latest \
              JellyfinCarouselPlugin.zip
          fi

          echo "✅ Release v${VERSION} publiée avec succès."
