name: Build & Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # historique complet pour le changelog automatique

      - name: Setup .NET 9.0
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore dependencies
        run: dotnet restore --configfile nuget.config

      - name: Build
        run: dotnet build JellyfinCarouselPlugin.csproj -c Release --no-restore

      - name: Package ZIP
        run: |
          cd bin/Release/net9.0
          zip -r ../../../JellyfinCarouselPlugin.zip .
          cd ../../..
          echo "MD5: $(md5sum JellyfinCarouselPlugin.zip | awk '{print $1}')"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: JellyfinCarouselPlugin
          path: JellyfinCarouselPlugin.zip
          retention-days: 30

      - name: Get version and changelog
        id: release_info
        run: |
          # Version depuis manifest.json
          VERSION=$(python3 -c "import json; d=json.load(open('manifest.json')); print(d[0]['versions'][0]['version'])")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version détectée : $VERSION"

          # Trouver le dernier tag de release pour générer le changelog depuis ce point
          LAST_TAG=$(git tag --sort=-version:refname | grep -E '^[0-9]+\.[0-9]+\.[0-9]+' | head -1)

          if [ -z "$LAST_TAG" ]; then
            RAW=$(git log --no-merges --pretty=format:"%s" | head -30)
          else
            RAW=$(git log "${LAST_TAG}..HEAD" --no-merges --pretty=format:"%s")
          fi

          # Catégoriser les commits par type (Conventional Commits)
          FEATS=$(echo "$RAW" | grep -i "^feat" | sed 's/^feat[:(][^)]*[):]*//' | sed 's/^[: ]*//' | sed 's/^/- /' || true)
          FIXES=$(echo "$RAW" | grep -i "^fix" | sed 's/^fix[:(][^)]*[):]*//' | sed 's/^[: ]*//' | sed 's/^/- /' || true)
          OTHERS=$(echo "$RAW" | grep -iv "^feat\|^fix\|^chore\|^docs\|Merge" | sed 's/^/- /' | head -10 || true)

          {
            echo "CHANGELOG<<EOF"
            if [ -n "$FEATS" ]; then
              echo "### ✨ Nouvelles fonctionnalités"
              echo "$FEATS"
              echo ""
            fi
            if [ -n "$FIXES" ]; then
              echo "### 🐛 Corrections"
              echo "$FIXES"
              echo ""
            fi
            if [ -n "$OTHERS" ]; then
              echo "### 🔧 Améliorations"
              echo "$OTHERS"
              echo ""
            fi
            if [ -z "$FEATS" ] && [ -z "$FIXES" ] && [ -z "$OTHERS" ]; then
              echo "- Mise à jour et corrections diverses"
            fi
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_info.outputs.version }}
          name: "Media Carousel v${{ steps.release_info.outputs.version }}"
          files: JellyfinCarouselPlugin.zip
          make_latest: true
          body: |
            ## 🎬 Media Carousel v${{ steps.release_info.outputs.version }}

            Transformez votre Jellyfin en une expérience de streaming moderne et immersive.

            ---

            ${{ steps.release_info.outputs.CHANGELOG }}

            ---

            ## 🚀 Installation

            ### Via le catalogue Jellyfin (recommandé)

            1. **Dashboard → Plugins → Catalogues → +**
            2. Colle cette URL :
            ```
            https://raw.githubusercontent.com/peterdu1109/MediaCarousel/main/manifest.json
            ```
            3. **Dashboard → Plugins → Catalogue** → installe **Carousel Layout** → redémarre Jellyfin

            ### Installation manuelle

            1. Télécharge `JellyfinCarouselPlugin.zip` ci-dessous
            2. Extrais dans un dossier `CarouselLayout` dans le répertoire `plugins` de Jellyfin
            3. Redémarre Jellyfin

            ---

            ## ⚙️ Configuration

            **Dashboard → Plugins → Carousel Layout → Paramètres**, puis recharge la page (F5).

            ---

            ## 📋 Prérequis

            - Jellyfin **10.11.x**
            - Client **navigateur web** ou **app Android** (l'app iOS Swiftfin est native, non compatible)
